<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade] vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --bg-card: #141414;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --nomade-blue: #007AFF;
            --status-red: #FF3B30;
            --status-green: #34C759;
            --glass-bg: rgba(25, 25, 25, 0.75);
            --radius-main: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 20px 20px 140px 20px;
            -webkit-font-smoothing: antialiased;
        }

        header {
            max-width: 1100px;
            margin: 0 auto 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
        }

        .logo { font-weight: 700; font-size: 22px; letter-spacing: -1px; }
        .logo span { color: var(--nomade-blue); }

        .drive-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #1a1a1a;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-red); }
        .status-active { border-color: var(--status-green); color: var(--status-green); }
        .status-active .status-dot { background: var(--status-green); box-shadow: 0 0 8px var(--status-green); }
        .status-error { border-color: var(--status-red); color: var(--status-red); }

        .nav-container { max-width: 1100px; margin: 0 auto 35px; }
        .breadcrumbs { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; cursor: pointer; }
        .breadcrumbs span { color: var(--nomade-blue); }
        .section-title { font-size: 36px; font-weight: 700; letter-spacing: -1.5px; }

        .grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 30px;
        }

        .card { cursor: pointer; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-4px); }

        .cover {
            width: 100%; aspect-ratio: 1/1; border-radius: var(--radius-main);
            margin-bottom: 14px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: border 0.3s, box-shadow 0.3s;
        }
        .card:hover .cover { border-color: rgba(0, 122, 255, 0.5); box-shadow: 0 10px 25px rgba(0,0,0,0.4); }

        .info h3 { font-size: 15px; font-weight: 500; margin-bottom: 5px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            background: rgba(0, 122, 255, 0.1); color: var(--nomade-blue);
            font-size: 9px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase;
        }

        .player-pill {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 680px; background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 100px;
            padding: 12px 20px; display: flex; align-items: center; gap: 18px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 1000;
        }

        .p-info { display: flex; align-items: center; gap: 12px; width: 170px; overflow: hidden; }
        .p-art { width: 42px; height: 42px; border-radius: 50%; background: var(--nomade-blue); flex-shrink: 0; }
        .p-controls { flex-grow: 1; display: flex; flex-direction: column; gap: 6px; }
        .p-btns { display: flex; justify-content: center; gap: 25px; font-size: 18px; color: #fff; }
        .btn-main { color: var(--nomade-blue); font-size: 26px; cursor: pointer; }
        
        .progress-wrapper { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--text-secondary); }
        .progress-bar { flex-grow: 1; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
        .progress-fill { position: absolute; height: 100%; background: var(--nomade-blue); border-radius: 2px; width: 0%; }
    </style>
</head>
<body>

    <header>
        <div class="logo">[ nômade <span>vault</span> ]</div>
        <div id="drive-status" class="drive-status status-error">
            <div class="status-dot"></div>
            GOOGLE DRIVE
        </div>
    </header>

    <div class="nav-container">
        <div class="breadcrumbs" onclick="goHome()">Início > <span id="path-name">Vault</span></div>
        <h1 id="view-title" class="section-title">Meus Projetos</h1>
    </div>

    <div id="grid" class="grid"></div>

    <div class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div style="overflow: hidden;">
                <div id="p-title" style="font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nenhuma faixa</div>
                <div style="font-size: 10px; color: var(--text-secondary);">Nômade Record's</div>
            </div>
        </div>
        <div class="p-controls">
            <div class="p-btns">
                <span style="opacity:0.3; cursor:default">⏮</span>
                <span id="play-btn" class="btn-main" onclick="togglePlay()">▶</span>
                <span style="opacity:0.3; cursor:default">⏭</span>
            </div>
            <div class="progress-wrapper">
                <span id="curr-time">0:00</span>
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="total-time">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio-player" style="display:none;"></audio>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const progressFill = document.getElementById('progress-fill');

        function getSoftGradient(name) {
            const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            const baseHue = hash % 360;
            return `linear-gradient(145deg, hsl(${baseHue}, 85%, 55%), hsl(${(baseHue + 25) % 360}, 80%, 45%))`;
        }

        async function loadFolder(folderId = '') {
            const grid = document.getElementById('grid');
            const statusBtn = document.getElementById('drive-status');
            grid.innerHTML = '<p style="color: var(--text-secondary); padding: 20px;">Sincronizando com Nômade Drive...</p>';

            try {
                const url = folderId ? `${SCRIPT_URL}?folderId=${folderId}` : SCRIPT_URL;
                const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                
                if (!response.ok) throw new Error();
                const data = await response.json();

                statusBtn.classList.replace('status-error', 'status-active');
                document.getElementById('view-title').innerText = data.folderName || "Vault";
                renderItems(data.items);
            } catch (error) {
                statusBtn.classList.replace('status-active', 'status-error');
                grid.innerHTML = '<p style="color: var(--status-red); padding: 20px;">Erro de conexão. Verifique o console ou as permissões do script.</p>';
            }
        }

        function renderItems(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            if (!items || items.length === 0) {
                grid.innerHTML = '<p style="color: var(--text-secondary); padding: 20px;">Pasta vazia ou sem arquivos de áudio.</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? openFolder(item) : playTrack(item);
                
                card.innerHTML = `
                    <div class="cover" style="background: ${getSoftGradient(item.name)}"></div>
                    <div class="info">
                        <span class="badge">${item.info}</span>
                        <h3>${item.name}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openFolder(folder) {
            document.getElementById('path-name').innerText = folder.name;
            loadFolder(folder.id);
        }

        function playTrack(track) {
            document.getElementById('p-title').innerText = track.name;
            document.getElementById('p-art').style.background = getSoftGradient(track.name);
            
            audio.src = track.url;
            audio.play();
            playBtn.innerText = "⏸";
        }

        function togglePlay() {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        }

        function goHome() {
            document.getElementById('path-name').innerText = "Vault";
            loadFolder();
        }

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${pct}%`;
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-time').innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        loadFolder();
    </script>
</body>
</html>
