<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade] vault</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --nomade-blue: #007AFF;
            --border-subtle: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(15, 15, 15, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 20px 20px 160px 20px;
        }

        /* HEADER */
        header { max-width: 1100px; margin: 0 auto; padding-top: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--nomade-blue); }
        .header-line { width: 100%; height: 1px; background: var(--border-subtle); margin-bottom: 40px; }

        /* GRID */
        .nav-container { max-width: 1100px; margin: 0 auto 35px; }
        .section-title { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; margin-top: 10px; }
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        
        .card { cursor: pointer; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; border: 1px solid var(--border-subtle); margin-bottom: 12px; }
        .info h3 { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER SIMÉTRICO (850px) */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 850px;
            background: var(--glass-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            padding: 12px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; /* 3 colunas iguais */
            align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            z-index: 1000;
        }

        /* Lado Esquerdo: Info */
        .p-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .p-art { width: 44px; height: 44px; border-radius: 50%; background: #222; flex-shrink: 0; }
        .p-txt { overflow: hidden; }
        .p-txt div:first-child { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-txt div:last-child { font-size: 10px; color: var(--text-secondary); }

        /* Centro: Botões */
        .p-controls { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .btn-side { font-size: 16px; color: var(--text-secondary); cursor: pointer; transition: 0.2s; }
        .btn-side:hover { color: #fff; }
        .btn-main { 
            width: 48px; height: 48px; background: rgba(0, 122, 255, 0.1); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--nomade-blue); font-size: 24px; cursor: pointer; transition: 0.2s;
        }
        .btn-main:hover { transform: scale(1.05); background: rgba(0, 122, 255, 0.2); }

        /* Lado Direito: Progresso */
        .p-progress { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .bar-container { width: 100%; max-width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; cursor: pointer; }
        .bar-fill { position: absolute; height: 100%; background: var(--nomade-blue); border-radius: 2px; width: 0%; }
        .time-txt { font-size: 10px; color: var(--text-secondary); font-family: monospace; }

        @media (max-width: 768px) {
            .player-pill { grid-template-columns: 1fr 1fr; padding: 10px 20px; }
            .p-progress { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">[ nômade <span>vault</span> ]</div>
        </div>
        <div class="header-line"></div>
    </header>

    <div class="nav-container">
        <h1 id="view-title" class="section-title">Nômade Vault</h1>
    </div>

    <div id="grid" class="grid"></div>

    <div class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div class="p-txt">
                <div id="p-title">Nenhuma faixa</div>
                <div>Nômade Record's</div>
            </div>
        </div>
        
        <div class="p-controls">
            <span class="btn-side">⏮</span>
            <div id="play-btn" class="btn-main" onclick="togglePlay()">▶</div>
            <span class="btn-side">⏭</span>
        </div>

        <div class="p-progress">
            <div class="bar-container" onclick="seek(event)"><div id="bar-fill" class="bar-fill"></div></div>
            <div class="time-txt"><span id="curr-time">0:00</span> / <span id="total-time">0:00</span></div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous"></audio>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const barFill = document.getElementById('bar-fill');

        function getGradient(name) {
            const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            return `linear-gradient(135deg, hsl(${hash % 360}, 70%, 50%), hsl(${(hash + 40) % 360}, 60%, 40%))`;
        }

        async function loadFolder(folderId = '') {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<p style="color: #444; padding: 20px;">Carregando...</p>';
            try {
                const url = folderId ? `${SCRIPT_URL}?folderId=${folderId}` : SCRIPT_URL;
                const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                const data = await response.json();
                document.getElementById('view-title').innerText = data.folderName || "Vault";
                render(data.items);
            } catch (e) { grid.innerHTML = '<p>Erro de conexão.</p>'; }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? loadFolder(item.id) : play(item);
                card.innerHTML = `<div class="cover" style="background: ${getGradient(item.name)}"></div>
                                  <div class="info"><h3>${item.name}</h3></div>`;
                grid.appendChild(card);
            });
        }

        function play(track) {
            document.getElementById('p-title').innerText = track.name;
            document.getElementById('p-art').style.background = getGradient(track.name);
            
            // Usando link de export direto para evitar bloqueio do player
            audio.src = track.url; 
            audio.load();
            audio.play().then(() => playBtn.innerText = "⏸").catch(e => console.log("Erro no play"));
        }

        function togglePlay() {
            if (!audio.src) return;
            if (audio.paused) { audio.play(); playBtn.innerText = "⏸"; }
            else { audio.pause(); playBtn.innerText = "▶"; }
        }

        function seek(e) {
            if (!audio.duration) return;
            audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
        }

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            barFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            document.getElementById('curr-time').innerText = format(audio.currentTime);
            document.getElementById('total-time').innerText = format(audio.duration);
        };

        function format(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        loadFolder();
    </script>
</body>
</html>
