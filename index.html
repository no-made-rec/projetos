<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;700;900&display=swap');
        :root { --bg: #050505; --blue: #007AFF; --border: rgba(255,255,255,0.08); --dim: #555; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 40px; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto 60px; }
        .logo { font-weight: 900; font-size: 22px; text-decoration:none; color:#fff; letter-spacing:-1px; }
        .logo span { color: var(--blue); font-weight: 400; }
        .api-status { font-family: 'JetBrains Mono'; font-size: 10px; color: #34C759; border: 1px solid var(--border); padding: 6px 15px; border-radius: 100px; }
        .syncing { color: #FF3B30; border-color: #FF3B30; }

        /* VIEW MODES */
        .container { max-width: 1200px; margin: 0 auto; }
        .section-header { margin-bottom: 40px; }
        .section-header h1 { font-size: 48px; font-weight: 900; letter-spacing: -2px; }
        
        /* MODO GRADE (PASTAS) */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; }
        .folder-card { cursor: pointer; transition: 0.3s; }
        .folder-card:hover { transform: translateY(-5px); }
        .folder-box { width: 100%; aspect-ratio: 1.5; background: #111; border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 15px; }
        .folder-card h3 { font-size: 14px; margin-bottom: 5px; }
        .folder-card span { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--dim); }

        /* MODO TRACKLIST (DENTRO DO PROJETO) */
        .project-view { display: grid; grid-template-columns: 350px 1fr; gap: 60px; opacity: 0; animation: fadeIn 0.5s forwards; }
        .project-cover { width: 350px; height: 350px; border-radius: 12px; position: sticky; top: 40px; }
        .tracklist { list-style: none; }
        .track-item { padding: 15px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .track-item:hover { color: var(--blue); }
        .track-item.active { color: var(--blue); font-weight: 700; }
        .track-name { font-family: 'JetBrains Mono'; font-size: 13px; }

        /* RECALLS */
        .recall-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px; }
        .recall-input-wrap { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { background: #111; border: 1px solid var(--border); padding: 10px; color: #fff; border-radius: 4px; flex: 1; font-family: 'JetBrains Mono'; }
        .recall-list { font-family: 'JetBrains Mono'; font-size: 12px; color: var(--dim); }
        .recall-item { margin-bottom: 8px; cursor: pointer; }
        .recall-item b { color: var(--blue); }

        /* PLAYER PILL */
        .player-pill { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(200px); width: 850px; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px; padding: 15px 40px; display: grid; grid-template-columns: 180px 1fr 200px; gap: 30px; align-items: center; transition: 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
        .player-visible { transform: translateX(-50%) translateY(0); }
        .p-info { overflow: hidden; }
        .p-info div { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'JetBrains Mono'; font-size: 11px; }
        .p-controls { display: flex; align-items: center; gap: 15px; justify-content: flex-end; }
        .btn { cursor: pointer; font-size: 18px; transition: 0.2s; }
        .btn:hover { color: var(--blue); scale: 1.1; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <a href="https://tr.ee/nomaderecords" target="_blank" class="logo">[ nômade <span>vault</span> ]</a>
        <div id="status" class="api-status">• API SYNC</div>
    </div>

    <div class="container">
        <div class="section-header">
            <div id="breadcrumb" style="font-family:'JetBrains Mono'; font-size:10px; color:var(--dim); cursor:pointer; margin-bottom:10px;" onclick="load()">ROOT > VAULT</div>
            <h1 id="title">Projetos</h1>
        </div>
        <div id="content"></div>
    </div>

    <div id="player" class="player-pill">
        <div class="p-info">
            <div id="p-name" style="font-weight:700">IDLE</div>
            <div style="color:var(--dim); font-size:9px">NÔMADE RECORD'S</div>
        </div>
        <div class="p-mid">
            <div id="waveform"></div>
            <div style="display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:9px; color:var(--blue); margin-top:5px;">
                <span id="c-time">00:00</span>
                <span id="t-time">00:00</span>
            </div>
        </div>
        <div class="p-controls">
            <span class="btn" id="prev-btn">⏮</span>
            <span class="btn" id="play-btn" onclick="wavesurfer.playPause()">▶</span>
            <span class="btn" id="next-btn">⏭</span>
            <input type="range" min="0" max="1" step="0.1" value="0.8" oninput="wavesurfer.setVolume(this.value)" style="width:50px;">
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        let currentTracks = [];
        let currentIndex = -1;

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#222',
            progressColor: '#007AFF',
            height: 30,
            barWidth: 2,
            normalize: true
        });

        async function load(id = '') {
            const content = document.getElementById('content');
            content.innerHTML = '<div style="font-family:JetBrains Mono; color:var(--dim)">LOADING_VAULT...</div>';
            
            const res = await fetch(id ? `${SCRIPT_URL}?folderId=${id}` : SCRIPT_URL);
            const data = await res.json();
            
            document.getElementById('title').innerText = data.name === 'Root' ? 'Projetos' : data.name;
            render(data.items);
        }

        function render(items) {
            const content = document.getElementById('content');
            content.innerHTML = '';
            
            const hasFiles = items.some(i => i.type === 'file');
            
            if (hasFiles) {
                // MODO PROJETO (CAPA + TRACKLIST)
                currentTracks = items.filter(i => i.type === 'file');
                const projectDiv = document.createElement('div');
                projectDiv.className = 'project-view';
                
                const grad = `linear-gradient(135deg, hsl(${Math.random()*360},70%,50%), #000)`;
                
                projectDiv.innerHTML = `
                    <div>
                        <div class="project-cover" style="background:${grad}"></div>
                        <div class="recall-section">
                            <div class="recall-input-wrap">
                                <input type="text" id="recall-msg" placeholder="Adicionar Recall...">
                                <button onclick="addRecall()" style="background:var(--blue); border:none; padding:0 15px; border-radius:4px; color:#fff; cursor:pointer">+</button>
                            </div>
                            <div id="recall-list" class="recall-list"></div>
                        </div>
                    </div>
                    <ul class="tracklist">
                        ${currentTracks.map((t, i) => `
                            <li class="track-item" onclick="play(${i})">
                                <span class="track-name">${t.name}</span>
                                <span style="font-family:JetBrains Mono; font-size:10px; color:var(--dim)">${t.size}</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
                content.appendChild(projectDiv);
            } else {
                // MODO GRADE (PASTAS)
                const grid = document.createElement('div');
                grid.className = 'grid';
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'folder-card';
                    card.onclick = () => load(item.id);
                    card.innerHTML = `
                        <div class="folder-box">📁</div>
                        <h3>${item.name}</h3>
                        <span>${item.meta}</span>
                    `;
                    grid.appendChild(card);
                });
                content.appendChild(grid);
            }
        }

        async function play(index) {
            const track = currentTracks[index];
            currentIndex = index;
            const status = document.getElementById('status');
            
            status.innerText = '• SYNCING...';
            status.classList.add('syncing');
            
            const res = await fetch(`${SCRIPT_URL}?fileId=${track.id}`);
            const base64 = await res.text();
            
            wavesurfer.load(`data:audio/mpeg;base64,${base64}`);
            wavesurfer.on('ready', () => {
                document.getElementById('player').classList.add('player-visible');
                document.getElementById('p-name').innerText = track.name;
                wavesurfer.play();
                status.innerText = '• API SYNC';
                status.classList.remove('syncing');
                updateRecalls();
            });
        }

        // CONTROLES DE FLUXO (DOUBLE CLICK LOGIC)
        let lastClick = 0;
        document.getElementById('next-btn').onclick = () => {
            const now = Date.now();
            if (now - lastClick < 300) { if(currentIndex < currentTracks.length-1) play(currentIndex+1); }
            else { wavesurfer.skip(5); }
            lastClick = now;
        };
        document.getElementById('prev-btn').onclick = () => {
            const now = Date.now();
            if (now - lastClick < 300) { if(currentIndex > 0) play(currentIndex-1); }
            else { wavesurfer.skip(-5); }
            lastClick = now;
        };

        // SISTEMA DE RECALL
        function addRecall() {
            const msg = document.getElementById('recall-msg').value;
            if (!msg || currentIndex === -1) return;
            const time = wavesurfer.getCurrentTime();
            const trackId = currentTracks[currentIndex].id;
            
            const recalls = JSON.parse(localStorage.getItem('recalls') || '{}');
            if(!recalls[trackId]) recalls[trackId] = [];
            recalls[trackId].push({ time, msg });
            localStorage.setItem('recalls', JSON.stringify(recalls));
            
            document.getElementById('recall-msg').value = '';
            updateRecalls();
        }

        function updateRecalls() {
            const trackId = currentTracks[currentIndex].id;
            const recalls = JSON.parse(localStorage.getItem('recalls') || '{}')[trackId] || [];
            const list = document.getElementById('recall-list');
            list.innerHTML = recalls.map(r => `
                <div class="recall-item" onclick="wavesurfer.setTime(${r.time})">
                    <b>${format(r.time)}</b>: ${r.msg}
                </div>
            `).join('');
        }

        wavesurfer.on('audioprocess', () => document.getElementById('c-time').innerText = format(wavesurfer.getCurrentTime()));
        wavesurfer.on('ready', () => document.getElementById('t-time').innerText = format(wavesurfer.getDuration()));
        function format(s) { const m=Math.floor(s/60); const sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }

        load();
    </script>
</body>
</html>
