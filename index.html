<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap');
        :root { --bg: #0a0a0a; --blue: #007AFF; --border: rgba(255,255,255,0.1); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 20px; }
        
        /* HEADER ORIGINAL */
        header { max-width: 1100px; margin: 0 auto; padding-top: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--blue); font-weight: 400; }
        .api-status { font-family: 'JetBrains Mono'; font-size: 10px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px; color: #555; }
        .active { border-color: #34C759; color: #34C759; }
        .header-line { width: 100vw; height: 1px; background: var(--border); margin-left: calc(-50vw + 50%); margin-bottom: 40px; }

        /* GRID */
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .cover { width: 100%; aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
        .card h3 { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER PILL 850px */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 850px; background: #0f0f0f; border: 1px solid var(--border);
            border-radius: 100px; padding: 12px 30px; display: grid; grid-template-columns: 220px 1fr 100px;
            align-items: center; gap: 30px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .p-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .p-art { width: 44px; height: 44px; border-radius: 50%; background: #222; flex-shrink: 0; }
        .p-txt { font-family: 'JetBrains Mono'; font-size: 11px; overflow: hidden; }
        .p-txt div:first-child { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-txt div:last-child { color: #555; font-size: 9px; }

        .progress-bar { width: 100%; height: 4px; background: #1a1a1a; border-radius: 2px; position: relative; cursor: pointer; }
        .progress-fill { position: absolute; height: 100%; background: var(--blue); width: 0%; border-radius: 2px; }
        
        .btn-play { width: 48px; height: 48px; background: rgba(0,122,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--blue); cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">[ nômade <span>vault</span> ]</div>
            <div id="status" class="api-status">VAULT_CONNECT: IDLE</div>
        </div>
        <div class="header-line"></div>
    </header>

    <div id="grid" class="grid"></div>

    <div class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div class="p-txt"><div id="p-title">STANDBY</div><div>NÔMADE RECORD'S</div></div>
        </div>
        <div class="progress-bar" onclick="seek(event)"><div id="progress-fill" class="progress-fill"></div></div>
        <div style="display:flex; justify-content:flex-end;"><div id="play-btn" class="btn-play" onclick="togglePlay()">▶</div></div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        const audio = document.getElementById('audio-engine');
        const playBtn = document.getElementById('play-btn');

        async function load(fId = '') {
            const resp = await fetch(fId ? `${SCRIPT_URL}?folderId=${fId}` : SCRIPT_URL);
            const data = await resp.json();
            document.getElementById('status').innerText = 'VAULT_CONNECT: ACTIVE';
            document.getElementById('status').classList.add('active');
            render(data.items);
        }

        function render(items) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? load(item.id) : play(item);
                const grad = `linear-gradient(135deg, hsl(${item.name.length * 20 % 360}, 80%, 50%), #000)`;
                card.innerHTML = `<div class="cover" style="background:${grad}"></div><h3>${item.name}</h3>`;
                grid.appendChild(card);
            });
        }

        async function play(track) {
            document.getElementById('p-title').innerText = track.name.toUpperCase();
            document.getElementById('p-art').style.background = `linear-gradient(135deg, #007AFF, #000)`;
            
            // BUSCA O ÁUDIO VIA SCRIPT (BYPASS GOOGLE DRIVE ERRORS)
            const resp = await fetch(`${SCRIPT_URL}?fileId=${track.id}`);
            const base64Data = await resp.text();
            audio.src = `data:audio/mpeg;base64,${base64Data}`;
            audio.play();
            playBtn.innerText = '⏸';
        }

        function togglePlay() { 
            if(audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        }

        function seek(e) { audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%'; };

        load();
    </script>
</body>
</html>
