<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;700;900&display=swap');

        :root {
            --bg: #050505;
            --blue: #007AFF;
            --green: #34C759;
            --red: #FF3B30;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            padding: 20px 20px 180px 20px; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER & STATUS */
        header { max-width: 1100px; margin: 0 auto; padding-top: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        
        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1.2px; text-decoration: none; color: #fff; transition: 0.3s; }
        .logo:hover { opacity: 0.6; }
        .logo span { color: var(--blue); font-weight: 400; }

        .api-status {
            display: flex; align-items: center; gap: 8px; padding: 6px 14px;
            background: #000; border-radius: 100px; border: 1px solid var(--border);
            font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--green);
            transition: all 0.3s ease;
        }
        .status-syncing { color: var(--red) !important; border-color: var(--red) !important; box-shadow: 0 0 10px rgba(255,59,48,0.2); }

        .header-line { width: 100vw; height: 1px; background: var(--border); margin-left: calc(-50vw + 50%); margin-bottom: 50px; }

        /* NAV */
        .nav-container { max-width: 1100px; margin: 0 auto 40px; display: flex; justify-content: space-between; align-items: flex-end; }
        .breadcrumbs { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--text-dim); text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .breadcrumbs:hover { color: #fff; }
        .section-title { font-size: 42px; font-weight: 900; letter-spacing: -2px; margin-top: 5px; }

        /* GRID */
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { cursor: pointer; transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1); position: relative; }
        .card:hover { transform: translateY(-10px) scale(1.02); }
        .cover { 
            width: 100%; aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 12px; transition: 0.3s; 
        }
        .card:hover .cover { border-color: var(--blue); box-shadow: 0 20px 40px rgba(0,122,255,0.15); }
        
        .version-tag {
            position: absolute; top: 12px; right: 12px; background: #000; padding: 4px 8px; 
            border-radius: 4px; font-family: 'JetBrains Mono'; font-size: 9px; color: var(--blue); border: 1px solid var(--blue);
        }

        .card-meta { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 9px; color: var(--text-dim); margin-top: 5px; }
        .card h3 { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER PILL (ANIMADO) */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(150%);
            width: 95%; max-width: 850px; background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px); border: 1px solid var(--border);
            border-radius: 100px; padding: 15px 40px; display: grid; 
            grid-template-columns: 200px 1fr 220px; align-items: center; gap: 35px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9); z-index: 1000;
            transition: all 0.6s cubic-bezier(0.2, 1, 0.2, 1); opacity: 0; pointer-events: none;
        }
        .player-visible { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }

        .p-info { display: flex; align-items: center; gap: 14px; overflow: hidden; }
        .p-art { width: 44px; height: 44px; border-radius: 50%; background: #111; flex-shrink: 0; }
        .p-txt { font-family: 'JetBrains Mono'; font-size: 11px; overflow: hidden; }
        .p-txt .name { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: 0.2s; cursor: pointer; }
        .p-txt .name:hover { color: var(--blue); text-decoration: underline; }
        .p-txt .sub { color: var(--text-dim); font-size: 9px; text-transform: uppercase; }

        #waveform { width: 100%; height: 35px; cursor: pointer; }
        .time-wrap { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 9px; color: var(--blue); margin-top: 6px; }

        .p-controls { display: flex; align-items: center; gap: 15px; justify-content: flex-end; }
        .btn-action { color: #555; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-action:hover { color: #fff; transform: scale(1.1); }
        .btn-play {
            width: 48px; height: 48px; background: rgba(0, 122, 255, 0.1); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; color: var(--blue); cursor: pointer; transition: 0.2s; font-size: 16px;
        }
        .btn-play:hover { transform: scale(1.1); background: var(--blue); color: #000; }

        /* VOLUME SLIDER */
        .volume-wrap { display: flex; align-items: center; gap: 8px; margin-left: 10px; }
        .vol-slider { -webkit-appearance: none; width: 60px; height: 2px; background: #222; border-radius: 2px; }
        .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; background: var(--blue); border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <a href="https://tr.ee/nomaderecords" target="_blank" class="logo">[ nômade <span>vault</span> ]</a>
            <div id="status" class="api-status">• API SYNC</div>
        </div>
        <div class="header-line"></div>
    </header>

    <div class="nav-container">
        <div>
            <div class="breadcrumbs" onclick="goHome()">ROOT > <span id="path-name">VAULT</span></div>
            <h1 class="section-title">Projetos</h1>
        </div>
    </div>

    <div id="grid" class="grid"></div>

    <div id="player" class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div class="p-txt">
                <div id="p-title" class="name" onclick="goToParentFolder()">IDLE_SYSTEM</div>
                <div class="sub">NÔMADE_RECORDS</div>
            </div>
        </div>
        <div class="waveform-wrap">
            <div id="waveform"></div>
            <div class="time-wrap">
                <span id="curr-time">00:00</span>
                <span id="total-time">00:00</span>
            </div>
        </div>
        <div class="p-controls">
            <span class="btn-action" onclick="skip(-5)">⏮</span>
            <div id="play-btn" class="btn-play" onclick="togglePlay()">▶</div>
            <span class="btn-action" onclick="skip(5)">⏭</span>
            <div class="volume-wrap">
                <span style="font-size: 10px;">🔊</span>
                <input type="range" class="vol-slider" min="0" max="1" step="0.1" value="0.8" oninput="setVol(this.value)">
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        let currentTrackParentId = null;

        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#1a1a1a',
            progressColor: '#007AFF',
            cursorColor: '#007AFF',
            barWidth: 2,
            barRadius: 2,
            responsive: true,
            height: 35,
            normalize: true
        });

        function getGrad(name) {
            const h = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0) % 360;
            return `linear-gradient(135deg, hsl(${h}, 90%, 40%), #000)`;
        }

        async function load(fId = '') {
            const grid = document.getElementById('grid');
            grid.style.opacity = '0.5';
            const resp = await fetch(fId ? `${SCRIPT_URL}?folderId=${fId}` : SCRIPT_URL);
            const data = await resp.json();
            grid.style.opacity = '1';
            render(data.items);
        }

        function render(items) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? openFolder(item) : play(item);
                
                const v = item.name.match(/V\d+/i);
                const tag = v ? `<div class="version-tag">${v[0].toUpperCase()}</div>` : '';
                const info = item.type === 'folder' ? item.count : item.size;

                card.innerHTML = `
                    ${tag}
                    <div class="cover" style="background:${getGrad(item.name)}"></div>
                    <h3>${item.name}</h3>
                    <div class="card-meta"><span>${info}</span><span>${item.updated}</span></div>
                `;
                grid.appendChild(card);
            });
        }

        function openFolder(f) {
            document.getElementById('path-name').innerText = f.name.toUpperCase();
            load(f.id);
        }

        async function play(track) {
            const status = document.getElementById('status');
            const player = document.getElementById('player');
            
            currentTrackParentId = track.parentId;
            document.getElementById('p-title').innerText = track.name.toUpperCase();
            document.getElementById('p-art').style.background = getGrad(track.name);
            
            status.innerText = '• SYNCING_AUDIO...';
            status.classList.add('status-syncing');

            try {
                const resp = await fetch(`${SCRIPT_URL}?fileId=${track.id}`);
                const base64Data = await resp.text();
                
                wavesurfer.load(`data:audio/mpeg;base64,${base64Data}`);
                wavesurfer.on('ready', () => {
                    player.classList.add('player-visible');
                    wavesurfer.play();
                    document.getElementById('play-btn').innerText = '⏸';
                    status.innerText = '• API SYNC';
                    status.classList.remove('status-syncing');
                });
            } catch(e) {
                status.innerText = '• SYNC_ERROR';
            }
        }

        function togglePlay() { 
            wavesurfer.playPause();
            document.getElementById('play-btn').innerText = wavesurfer.isPlaying() ? '⏸' : '▶';
        }

        function goToParentFolder() {
            if (currentTrackParentId) {
                load(currentTrackParentId);
                document.getElementById('path-name').innerText = "NAVIGATING...";
            }
        }

        function setVol(v) { wavesurfer.setVolume(v); }
        function skip(v) { wavesurfer.skip(v); }
        function goHome() { document.getElementById('path-name').innerText = "VAULT"; load(); }

        wavesurfer.on('audioprocess', () => { document.getElementById('curr-time').innerText = format(wavesurfer.getCurrentTime()); });
        wavesurfer.on('ready', () => { document.getElementById('total-time').innerText = format(wavesurfer.getDuration()); });

        function format(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        load();
    </script>
</body>
</html>
