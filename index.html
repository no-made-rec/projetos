<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --nomade-blue: #007AFF;
            --status-green: #34C759;
            --glass-bg: rgba(18, 18, 18, 0.95);
            --radius-main: 14px;
            --border-subtle: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            padding: 20px 20px 160px 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER */
        header {
            max-width: 1100px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--nomade-blue); }

        .header-line {
            width: 100%;
            height: 1px;
            background: var(--border-subtle);
            margin-bottom: 40px;
        }

        .drive-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: #1a1a1a;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-secondary); }
        .status-active { border-color: var(--status-green); color: var(--status-green); border: 1px solid; }
        .status-active .status-dot { background: var(--status-green); box-shadow: 0 0 8px var(--status-green); }

        /* NAVEGAÇÃO */
        .nav-container { max-width: 1100px; margin: 0 auto 35px; }
        .breadcrumbs { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; cursor: pointer; }
        .section-title { font-size: 38px; font-weight: 700; letter-spacing: -1.5px; }

        /* GRID */
        .grid {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 32px;
        }

        .card { cursor: pointer; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-6px); }

        .cover {
            width: 100%; aspect-ratio: 1/1; border-radius: var(--radius-main);
            margin-bottom: 14px;
            border: 1px solid var(--border-subtle);
            transition: all 0.3s;
        }
        .card:hover .cover { border-color: var(--nomade-blue); box-shadow: 0 12px 30px rgba(0,0,0,0.5); }

        .info h3 { font-size: 15px; font-weight: 500; margin-bottom: 5px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 5px;
            background: rgba(0, 122, 255, 0.12); color: var(--nomade-blue);
            font-size: 10px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase;
        }

        /* PLAYER REPAGINADO (850px) */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 850px; 
            background: var(--glass-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border-subtle); border-radius: 100px;
            padding: 16px 28px; display: flex; align-items: center; gap: 24px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6); z-index: 1000;
        }

        .p-info { display: flex; align-items: center; gap: 14px; width: 220px; overflow: hidden; }
        .p-art { width: 48px; height: 48px; border-radius: 50%; background: var(--nomade-blue); flex-shrink: 0; transition: transform 0.4s; }
        .playing .p-art { animation: rotate 8s linear infinite; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .p-controls { flex-grow: 1; display: flex; flex-direction: column; gap: 8px; }
        .p-btns { display: flex; justify-content: center; gap: 30px; font-size: 20px; color: #fff; align-items: center; }
        .btn-main { color: var(--nomade-blue); font-size: 32px; cursor: pointer; transition: transform 0.2s; }
        .btn-main:hover { transform: scale(1.1); }
        
        .progress-wrapper { display: flex; align-items: center; gap: 12px; font-size: 11px; color: var(--text-secondary); }
        .progress-bar { flex-grow: 1; height: 4px; background: rgba(255,255,255,0.08); border-radius: 10px; position: relative; cursor: pointer; }
        .progress-fill { position: absolute; height: 100%; background: var(--nomade-blue); border-radius: 10px; width: 0%; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">[ nômade <span>vault</span> ]</div>
            <div id="drive-status" class="drive-status">
                <div class="status-dot"></div>
                GOOGLE DRIVE API
            </div>
        </div>
        <div class="header-line"></div>
    </header>

    <div class="nav-container">
        <div class="breadcrumbs" onclick="goHome()">Início > <span id="path-name">Vault</span></div>
        <h1 id="view-title" class="section-title">Carregando...</h1>
    </div>

    <div id="grid" class="grid"></div>

    <div id="player-container" class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div style="overflow: hidden;">
                <div id="p-title" style="font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nenhuma faixa</div>
                <div style="font-size: 11px; color: var(--text-secondary);">Nômade Record's</div>
            </div>
        </div>
        
        <div class="p-controls">
            <div class="p-btns">
                <span style="opacity:0.3; cursor:default; font-size: 16px;">⏮</span>
                <span id="play-btn" class="btn-main" onclick="togglePlay()">▶</span>
                <span style="opacity:0.3; cursor:default; font-size: 16px;">⏭</span>
            </div>
            <div class="progress-wrapper">
                <span id="curr-time">0:00</span>
                <div class="progress-bar" onclick="seek(event)"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="total-time">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio-player" crossorigin="anonymous" style="display:none;"></audio>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const progressFill = document.getElementById('progress-fill');
        const playerCont = document.getElementById('player-container');

        function getSoftGradient(name) {
            const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            const baseHue = hash % 360;
            return `linear-gradient(135deg, hsl(${baseHue}, 70%, 50%), hsl(${(baseHue + 40) % 360}, 60%, 40%))`;
        }

        async function loadFolder(folderId = '') {
            const grid = document.getElementById('grid');
            const statusBtn = document.getElementById('drive-status');
            grid.innerHTML = '<p style="color: var(--text-secondary); padding: 20px;">Sincronizando...</p>';

            try {
                const url = folderId ? `${SCRIPT_URL}?folderId=${folderId}` : SCRIPT_URL;
                const response = await fetch(url, { method: 'GET', redirect: 'follow' });
                const data = await response.json();

                statusBtn.classList.add('status-active');
                document.getElementById('view-title').innerText = data.folderName || "Vault";
                renderItems(data.items);
            } catch (error) {
                statusBtn.classList.remove('status-active');
                grid.innerHTML = '<p style="color: var(--status-red); padding: 20px;">Erro de conexão. Verifique o Script.</p>';
            }
        }

        function renderItems(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? openFolder(item) : playTrack(item);
                
                card.innerHTML = `
                    <div class="cover" style="background: ${getSoftGradient(item.name)}"></div>
                    <div class="info">
                        <span class="badge">${item.info}</span>
                        <h3>${item.name}</h3>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openFolder(folder) {
            document.getElementById('path-name').innerText = folder.name;
            loadFolder(folder.id);
        }

        function playTrack(track) {
            document.getElementById('p-title').innerText = track.name;
            document.getElementById('p-art').style.background = getSoftGradient(track.name);
            
            // Agora o track.url já traz o link alt=media + API KEY vindo do script
            audio.src = track.url;
            audio.load();
            
            audio.play().then(() => {
                playBtn.innerText = "⏸";
                playerCont.classList.add('playing');
            }).catch(e => {
                console.error("Play falhou:", e);
                // Se falhar por bloqueio de autoplay, o usuário clica no play principal
            });
        }

        function togglePlay() {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
                playerCont.classList.add('playing');
            } else {
                audio.pause();
                playBtn.innerText = "▶";
                playerCont.classList.remove('playing');
            }
        }

        function seek(e) {
            if (!audio.duration) return;
            const bar = e.currentTarget;
            const pct = e.offsetX / bar.offsetWidth;
            audio.currentTime = pct * audio.duration;
        }

        function goHome() {
            document.getElementById('path-name').innerText = "Vault";
            loadFolder();
        }

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${pct}%`;
            document.getElementById('curr-time').innerText = formatTime(audio.currentTime);
            document.getElementById('total-time').innerText = formatTime(audio.duration);
        };

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        loadFolder();
    </script>
</body>
</html>
