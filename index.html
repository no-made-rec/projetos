<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg-main: #0a0a0a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --nomade-blue: #007AFF;
            --status-red: #FF3B30;
            --status-green: #34C759;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; padding: 20px 20px 180px 20px; }

        /* HEADER */
        header { max-width: 1100px; margin: 0 auto; padding-top: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1px; }
        .logo span { color: var(--nomade-blue); font-weight: 400; }

        .api-status {
            display: flex; align-items: center; gap: 8px; padding: 6px 14px;
            background: rgba(255,255,255,0.03); border-radius: 100px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; border: 1px solid var(--border);
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--status-red); }
        .status-active { border-color: var(--status-green); color: var(--status-green); }
        .status-active .status-dot { background: var(--status-green); box-shadow: 0 0 8px var(--status-green); }

        .header-line { width: 100vw; height: 1px; background: var(--border); margin-left: calc(-50vw + 50%); margin-bottom: 40px; }

        /* GRID */
        .nav-container { max-width: 1100px; margin: 0 auto 35px; }
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { cursor: pointer; transition: transform 0.3s ease; }
        .card:hover { transform: translateY(-5px); }
        .cover { width: 100%; aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; }
        .info h3 { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER PILL SIMÉTRICO */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 850px; background: rgba(15, 15, 15, 0.98);
            backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px;
            padding: 12px 30px; display: grid; grid-template-columns: 220px 1fr 100px; align-items: center; gap: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 1000;
        }

        .p-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .p-art { width: 44px; height: 44px; border-radius: 50%; background: #222; flex-shrink: 0; }
        .p-txt { overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        .p-txt div:first-child { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-txt div:last-child { font-size: 9px; color: var(--text-secondary); text-transform: uppercase; }

        /* BARRA DE PROGRESSO (FUNCIONAL) */
        .p-progress { width: 100%; }
        .progress-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-fill { position: absolute; height: 100%; background: var(--nomade-blue); border-radius: 2px; width: 0%; }
        .time-txt { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 9px; color: var(--nomade-blue); margin-top: 6px; }

        .p-controls { display: flex; justify-content: flex-end; }
        .btn-play {
            width: 48px; height: 48px; background: rgba(0, 122, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--nomade-blue); font-size: 20px; cursor: pointer; transition: 0.2s;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">[ nômade <span>vault</span> ]</div>
            <div id="api-status" class="api-status"><div class="status-dot"></div> VAULT_CONNECT: IDLE</div>
        </div>
        <div class="header-line"></div>
    </header>

    <div class="nav-container"><h1 id="view-title" style="font-size: 38px; font-weight: 800; letter-spacing: -1.5px;">Resources</h1></div>
    <div id="grid" class="grid"></div>

    <div class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div class="p-txt"><div id="p-title">STANDBY</div><div>NÔMADE RECORD'S</div></div>
        </div>
        <div class="p-progress">
            <div class="progress-bg" onclick="seek(event)"><div id="progress-fill" class="progress-fill"></div></div>
            <div class="time-info"><div class="time-txt"><span id="curr-time">0:00</span><span id="total-time">0:00</span></div></div>
        </div>
        <div class="p-controls"><div id="play-btn" class="btn-play" onclick="togglePlay()">▶</div></div>
    </div>

    <audio id="audio-engine" style="display:none;"></audio>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        const audio = document.getElementById('audio-engine');
        const playBtn = document.getElementById('play-btn');
        const progressFill = document.getElementById('progress-fill');

        function getGradient(name) {
            const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            return `linear-gradient(135deg, hsl(${hash % 360}, 80%, 45%), #0d0d0d)`;
        }

        async function loadVault(folderId = '') {
            try {
                const url = folderId ? `${SCRIPT_URL}?folderId=${folderId}` : SCRIPT_URL;
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('api-status').classList.add('status-active');
                document.getElementById('api-status').innerHTML = '<div class="status-dot"></div> VAULT_CONNECT: ACTIVE';
                render(data.items);
            } catch (e) { console.error(e); }
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? loadVault(item.id) : play(item);
                card.innerHTML = `<div class="cover" style="background:${getGradient(item.name)}"></div><h3>${item.name}</h3>`;
                grid.appendChild(card);
            });
        }

        function play(track) {
            document.getElementById('p-title').innerText = track.name.toUpperCase();
            document.getElementById('p-art').style.background = getGradient(track.name);
            
            // O segredo: link de visualização direta que o drive não bloqueia
            audio.src = `https://docs.google.com/uc?export=open&id=${track.id}`;
            audio.play();
            playBtn.innerText = '⏸';
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
            else { audio.pause(); playBtn.innerText = '▶'; }
        }

        function seek(e) {
            audio.currentTime = (e.offsetX / e.currentTarget.offsetWidth) * audio.duration;
        }

        audio.ontimeupdate = () => {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            document.getElementById('curr-time').innerText = format(audio.currentTime);
            document.getElementById('total-time').innerText = format(audio.duration);
        };

        function format(s) {
            if(isNaN(s)) return "0:00";
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        loadVault();
    </script>
</body>
</html>
