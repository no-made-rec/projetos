<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[nômade vault]</title>
    <script src="https://unpkg.com/wavesurfer.js@7"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap');

        :root {
            --bg: #050505;
            --blue: #007AFF;
            --border: rgba(255, 255, 255, 0.08);
            --text-dim: #555;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; padding: 20px 20px 180px; -webkit-font-smoothing: antialiased; }

        /* HEADER */
        header { max-width: 1100px; margin: 0 auto; padding-top: 20px; }
        .header-content { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; }
        
        .logo { font-weight: 700; font-size: 24px; letter-spacing: -1px; cursor: pointer; text-decoration: none; color: #fff; transition: 0.3s; }
        .logo:hover { opacity: 0.7; }
        .logo span { color: var(--blue); font-weight: 400; }

        .api-status {
            display: flex; align-items: center; gap: 8px; padding: 6px 14px;
            background: rgba(255,255,255,0.02); border-radius: 100px;
            font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
        }
        .status-active { border-color: #34C759; color: #34C759; }

        .header-line { width: 100vw; height: 1px; background: var(--border); margin-left: calc(-50vw + 50%); margin-bottom: 50px; }

        /* GRID */
        .grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 30px; }
        .card { cursor: pointer; transition: transform 0.4s cubic-bezier(0.2, 1, 0.2, 1); position: relative; }
        .card:hover { transform: translateY(-8px); }
        
        .cover { 
            width: 100%; aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 12px; transition: 0.3s; 
        }
        .card:hover .cover { border-color: var(--blue); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }

        .version-tag {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8);
            padding: 4px 8px; border-radius: 4px; font-family: 'JetBrains Mono';
            font-size: 9px; font-weight: 700; color: var(--blue); border: 1px solid var(--blue);
        }

        .card h3 { font-size: 13px; font-weight: 500; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER PILL 850px */
        .player-pill {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 95%; max-width: 850px; background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 100px;
            padding: 12px 35px; display: grid; grid-template-columns: 200px 1fr 100px; align-items: center; gap: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); z-index: 1000;
        }

        .p-info { display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .p-art { width: 44px; height: 44px; border-radius: 50%; background: #111; flex-shrink: 0; }
        .p-txt { font-family: 'JetBrains Mono'; font-size: 11px; overflow: hidden; }
        .p-txt div:first-child { font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .p-txt div:last-child { color: var(--text-dim); font-size: 9px; margin-top: 2px; }

        .waveform-wrap { width: 100%; position: relative; }
        #waveform { width: 100%; height: 40px; cursor: pointer; }
        .time-wrap { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 9px; color: var(--blue); margin-top: 6px; }

        .btn-play {
            width: 48px; height: 48px; background: rgba(0, 122, 255, 0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: var(--blue); cursor: pointer; transition: 0.2s; font-size: 18px;
        }
        .btn-play:hover { transform: scale(1.1); background: rgba(0, 122, 255, 0.2); }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <a href="https://tr.ee/nomaderecords" target="_blank" class="logo">[ nômade <span>vault</span> ]</a>
            <div id="status" class="api-status">• API SYNC</div>
        </div>
        <div class="header-line"></div>
    </header>

    <div id="grid" class="grid"></div>

    <div class="player-pill">
        <div class="p-info">
            <div id="p-art" class="p-art"></div>
            <div class="p-txt"><div id="p-title">IDLE_SYSTEM</div><div>NÔMADE_RECORDS</div></div>
        </div>
        <div class="waveform-wrap">
            <div id="waveform"></div>
            <div class="time-wrap">
                <span id="curr-time">00:00</span>
                <span id="total-time">00:00</span>
            </div>
        </div>
        <div style="display:flex; justify-content:flex-end;">
            <div id="play-btn" class="btn-play" onclick="togglePlay()">▶</div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1vN5ZhIopgWRlQpL2Uxkl4IZlQMTLeHMX4nKmZhewW2in5LFkmFNMJ5tBZHjfOj-N/exec';
        
        const wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#1a1a1a',
            progressColor: '#007AFF',
            cursorColor: '#007AFF',
            barWidth: 2,
            barRadius: 2,
            responsive: true,
            height: 40,
            normalize: true
        });

        function getGradient(name) {
            const hash = name.split('').reduce((acc, c) => acc + c.charCodeAt(0), 0);
            return `linear-gradient(135deg, hsl(${hash % 360}, 80%, 45%), #050505)`;
        }

        async function load(fId = '') {
            const resp = await fetch(fId ? `${SCRIPT_URL}?folderId=${fId}` : SCRIPT_URL);
            const data = await resp.json();
            document.getElementById('status').classList.add('status-active');
            render(data.items);
        }

        function render(items) {
            const grid = document.getElementById('grid'); grid.innerHTML = '';
            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => item.type === 'folder' ? load(item.id) : play(item);
                
                // Extrai versão (ex: busca V1, V2, etc no nome)
                const versionMatch = item.name.match(/V\d+/i);
                const versionTag = versionMatch ? `<div class="version-tag">${versionMatch[0].toUpperCase()}</div>` : '';

                card.innerHTML = `
                    ${versionTag}
                    <div class="cover" style="background:${getGradient(item.name)}"></div>
                    <h3>${item.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        async function play(track) {
            document.getElementById('p-title').innerText = track.name.toUpperCase();
            document.getElementById('p-art').style.background = getGradient(track.name);
            
            // API SYNC LOADING
            document.getElementById('status').innerText = '• SYNCING AUDIO...';
            
            const resp = await fetch(`${SCRIPT_URL}?fileId=${track.id}`);
            const base64Data = await resp.text();
            
            wavesurfer.load(`data:audio/mpeg;base64,${base64Data}`);
            
            wavesurfer.on('ready', () => {
                wavesurfer.play();
                document.getElementById('play-btn').innerText = '⏸';
                document.getElementById('status').innerText = '• API SYNC';
            });
        }

        function togglePlay() { 
            wavesurfer.playPause();
            document.getElementById('play-btn').innerText = wavesurfer.isPlaying() ? '⏸' : '▶';
        }

        wavesurfer.on('audioprocess', () => {
            document.getElementById('curr-time').innerText = format(wavesurfer.getCurrentTime());
        });

        wavesurfer.on('ready', () => {
            document.getElementById('total-time').innerText = format(wavesurfer.getDuration());
        });

        function format(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        load();
    </script>
</body>
</html>
